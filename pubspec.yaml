name: new_pharamacy_theme_v1
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  easy_localization: ^3.0.8
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^19.0.0
  flutter_screenutil: ^5.9.3
  get_it: ^9.2.1
  go_router: ^14.8.1
  image_picker: ^1.2.2
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
